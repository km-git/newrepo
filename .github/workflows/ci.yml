name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: bash scripts/setup_environment.sh --skip-auth

      - name: Run pytest
        run: .venv/bin/python -m pytest tests/ -q --tb=short

      - name: E2E health (offline)
        run: |
          EW_WEB_INTEL=0 EW_WS_ENABLED=0 .venv/bin/python scripts/e2e_trading_cycle.py --health
        env:
          EW_OKF_BRAIN_DIR: /tmp/ew-okf-test
          EW_PAPER_LEDGER: /tmp/ew-paper-test.json
